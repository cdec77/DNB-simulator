        :root {
            --primary-color: #4a90e2;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --light-gray: #f8f9fa;
            --medium-gray: #e9ecef;
            --dark-gray: #6c757d;
            --text-color: #333;
            --gold-color: #ffd700;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-gray);
            color: var(--text-color);
            line-height: 1.4;
            font-size: 14px;
        }

        .container {
            max-width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(90deg, var(--primary-color), #5a67d8);
            color: white;
            padding: 12px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header h1 {
            margin: 0;
            font-size: 1.3em;
            font-weight: 600;
        }

        .header h1 i {
            margin-right: 8px;
        }

        .copyright {
            font-size: 0.75em;
            opacity: 0.9;
            margin-top: 4px;
        }

        .install-pwa {
            display: none;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            width: calc(100% - 30px);
            margin: 10px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .install-pwa i {
            margin-right: 8px;
        }

        .install-pwa:active {
            background-color: #3a7bc8;
        }

        .tabs {
            display: flex;
            background-color: white;
            border-bottom: 1px solid var(--medium-gray);
            padding: 0 10px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            font-size: 0.9em;
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab i {
            margin-right: 5px;
        }

        .tab-content {
            display: none;
            padding: 15px;
            background-color: white;
            flex: 1;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

            gap: 15px;
        }

        .epreuves-section, .results-section {

            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: var(--primary-color);
            font-size: 1.1em;
        }

        .section-title i {
            margin-right: 8px;
        }

        .matiere-group {

        }

            align-items: center;
            margin-bottom: 8px;
        }

        .matiere-label {
            width: 35%;
            font-weight: 500;
            font-size: 0.9em;
        }

        .trimestre-inputs {
            display: flex;
            width: 50%;
            gap: 5px;
        }

            padding: 8px;
            border: 1px solid var(--medium-gray);

            text-align: center;
            font-size: 0.9em;
        }

        .moyenne-cell {

            text-align: center;
            font-weight: 600;
            color: var(--primary-color);

        }

            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.85em;

            align-items: center;
        }

        .option-info i {
            margin-right: 8px;

        }

            margin-bottom: 8px;
